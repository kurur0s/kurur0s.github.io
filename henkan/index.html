<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyrics Romanizer</title>

  <!-- Kuroshiro + Kuromoji (client-side Japanese romanization) -->
  <script src="https://cdn.jsdelivr.net/npm/kuroshiro@1.2.0/dist/kuroshiro.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/kuroshiro-analyzer-kuromoji@1.1.0/dist/kuroshiro-analyzer-kuromoji.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f7f5f0;
      --surface:  #ffffff;
      --border:   #e0ddd6;
      --text:     #1a1916;
      --muted:    #8a8780;
      --accent:   #c8502a;
      --accent2:  #2a6ec8;
      --mono:     'DM Mono', monospace;
      --serif:    'DM Serif Display', serif;
      --radius:   6px;
      --shadow:   0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 2.5rem 2rem 1.5rem;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
    }

    header h1 {
      font-family: var(--serif);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400;
      letter-spacing: -.01em;
      line-height: 1;
    }

    header h1 span {
      color: var(--accent);
      font-style: italic;
    }

    header p.tagline {
      margin-top: .5rem;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* ── Main ── */
    main {
      flex: 1;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      padding: 0 2rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Search bar ── */
    .search-row {
      display: flex;
      gap: .5rem;
    }

    input[type="text"] {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: .65rem 1rem;
      font-family: var(--mono);
      font-size: 14px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--accent); }

    button {
      border: none;
      border-radius: var(--radius);
      padding: .65rem 1.25rem;
      font-family: var(--mono);
      font-size: 13px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.97); }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
    }
    .btn-primary:hover { opacity: .82; }

    .btn-ghost {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .btn-ghost:hover { border-color: var(--text); }

    /* ── Results list ── */
    #results-list {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }

    .result-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: .75rem 1rem;
      cursor: pointer;
      display: flex;
      gap: 1rem;
      align-items: center;
      transition: border-color .15s, box-shadow .15s;
    }
    .result-item:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }

    .result-item img {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: var(--border);
    }

    .result-meta strong {
      display: block;
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 400;
    }
    .result-meta span {
      color: var(--muted);
      font-size: 12px;
    }

    /* ── Lyrics panel ── */
    #lyrics-panel {
      display: none;
      flex-direction: column;
      gap: 1rem;
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .panel-header img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .panel-title strong {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 400;
      display: block;
    }
    .panel-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .mode-toggle {
      display: flex;
      gap: .4rem;
      flex-wrap: wrap;
    }

    .mode-toggle button {
      font-size: 11px;
      padding: .35rem .75rem;
      border-radius: 99px;
    }
    .mode-toggle button.active {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    #lyrics-box {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      white-space: pre-wrap;
      line-height: 2;
      font-size: 14px;
      max-height: 60vh;
      overflow-y: auto;
    }

    /* ruby annotation styling */
    ruby { ruby-align: center; }
    rt {
      font-size: .6em;
      color: var(--accent2);
      letter-spacing: .02em;
    }

    /* ── Status / spinner ── */
    #status {
      font-size: 12px;
      color: var(--muted);
      min-height: 1.2em;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .dot-spin {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      border-top-color: var(--accent);
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .03em;
    }

    /* ── Fade-in ── */
    .fade-in {
      animation: fadeIn .3s ease forwards;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform:none; } }

    @media (max-width: 520px) {
      header, main { padding-left: 1rem; padding-right: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Lyrics <span>Romanizer</span></h1>
  <p class="tagline">Japanese · Genius API · Furigana &amp; Romaji</p>
</header>

<main>
  <div class="search-row">
    <input type="text" id="search-input" placeholder="Song title or artist…" autocomplete="off" />
    <button class="btn-primary" id="search-btn">Search</button>
  </div>

  <div id="status"></div>

  <div id="results-list"></div>

  <div id="lyrics-panel">
    <div class="panel-header">
      <img id="panel-art" src="" alt="cover" />
      <div>
        <div class="panel-title">
          <strong id="panel-title"></strong>
          <span id="panel-artist"></span>
        </div>
      </div>
    </div>

    <div class="mode-toggle">
      <button class="btn-ghost active" data-mode="original">Original</button>
      <button class="btn-ghost" data-mode="furigana">Furigana</button>
      <button class="btn-ghost" data-mode="romaji">Romaji</button>
      <button class="btn-ghost" data-mode="hiragana">Hiragana</button>
    </div>

    <div id="lyrics-box"></div>
    <button class="btn-ghost" id="back-btn">← Back to results</button>
  </div>
</main>

<footer>Lyrics via Genius · Romanization via Kuroshiro + Kuromoji</footer>

<!-- Config (gitignored) -->
<script src="config.js"></script>
<script>
// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let kuroshiro = null;
let kuroshiroReady = false;
let originalLyrics = "";
let currentResults = [];

// ─────────────────────────────────────────────
//  DOM refs
// ─────────────────────────────────────────────
const searchInput  = document.getElementById("search-input");
const searchBtn    = document.getElementById("search-btn");
const statusEl     = document.getElementById("status");
const resultsList  = document.getElementById("results-list");
const lyricsPanel  = document.getElementById("lyrics-panel");
const lyricsBox    = document.getElementById("lyrics-box");
const panelTitle   = document.getElementById("panel-title");
const panelArtist  = document.getElementById("panel-artist");
const panelArt     = document.getElementById("panel-art");
const backBtn      = document.getElementById("back-btn");
const modeButtons  = document.querySelectorAll(".mode-toggle button");

// ─────────────────────────────────────────────
//  Kuroshiro init
// ─────────────────────────────────────────────
let kuroshiroInitPromise = null;

async function initKuroshiro() {
  if (kuroshiroReady) return;
  if (kuroshiroInitPromise) return kuroshiroInitPromise;

  kuroshiroInitPromise = (async () => {
    setStatus("Loading Japanese analyzer… (first time may take ~10s)", true);
    try {
      if (typeof Kuroshiro === "undefined" || typeof KuromojiAnalyzer === "undefined") {
        throw new Error("Kuroshiro or KuromojiAnalyzer not loaded. Check your internet connection.");
      }
      // The CDN bundle wraps the class under .default
      const KuroshiroClass = Kuroshiro.default || Kuroshiro;
      const AnalyzerClass  = KuromojiAnalyzer.default || KuromojiAnalyzer;
      kuroshiro = new KuroshiroClass();
      await kuroshiro.init(new AnalyzerClass({
        dictPath: "/henkan/dict"
      }));
      kuroshiroReady = true;
      setStatus("");
    } catch(e) {
      kuroshiro = null;
      kuroshiroInitPromise = null;
      throw e;
    }
  })();

  return kuroshiroInitPromise;
}

// ─────────────────────────────────────────────
//  Status helper
// ─────────────────────────────────────────────
function setStatus(msg, loading = false) {
  if (!msg) { statusEl.innerHTML = ""; return; }
  statusEl.innerHTML = loading
    ? `<span class="dot-spin"></span> ${msg}`
    : msg;
}

// ─────────────────────────────────────────────
//  Genius search
// ─────────────────────────────────────────────
async function searchGenius(query) {
  const apiUrl = `https://api.genius.com/search?q=${encodeURIComponent(query)}&per_page=8&access_token=${CONFIG.GENIUS_ACCESS_TOKEN}`;
  const proxy = `https://corsproxy.io/?url=${encodeURIComponent(apiUrl)}`;
  const res = await fetch(proxy);
  if (!res.ok) throw new Error(`Proxy error: ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.response.hits.map(h => h.result);
}

// ─────────────────────────────────────────────
//  Fetch lyrics via allorigins CORS proxy
// ─────────────────────────────────────────────
async function fetchLyrics(geniusUrl) {
  const proxy = `https://corsproxy.io/?url=${encodeURIComponent(geniusUrl)}`;
  const res = await fetch(proxy);
  if (!res.ok) throw new Error("Proxy fetch failed");
  const contents = await res.text();

  // Parse the HTML response
  const parser = new DOMParser();
  const doc = parser.parseFromString(contents, "text/html");

  // Genius wraps lyrics in [data-lyrics-container] divs
  const containers = doc.querySelectorAll('[data-lyrics-container="true"]');
  if (!containers.length) {
    // Fallback: try older structure
    const old = doc.querySelector(".lyrics");
    if (old) return old.innerText.trim();
    throw new Error("Could not find lyrics on this page.");
  }

  let lyrics = "";
  containers.forEach(c => {
    // Replace <br> with newlines
    c.querySelectorAll("br").forEach(br => br.replaceWith("\n"));
    // Remove annotation links but keep their text
    c.querySelectorAll("a").forEach(a => {
      a.replaceWith(a.textContent);
    });
    lyrics += c.textContent + "\n";
  });

  return lyrics.trim();
}

// ─────────────────────────────────────────────
//  Romanize helpers
// ─────────────────────────────────────────────
async function convertLyrics(text, mode) {
  if (!kuroshiroReady) {
    await initKuroshiro();
    if (!kuroshiroReady) throw new Error("Japanese analyzer failed to load. Try refreshing the page.");
  }
  if (mode === "original") return null; // handled separately

  const lines = text.split("\n");
  const converted = await Promise.all(lines.map(async line => {
    if (!line.trim()) return "";
    if (mode === "furigana") {
      return await kuroshiro.convert(line, { mode: "furigana", to: "hiragana" });
    } else if (mode === "romaji") {
      return await kuroshiro.convert(line, { mode: "normal", to: "romaji", romajiSystem: "hepburn" });
    } else if (mode === "hiragana") {
      return await kuroshiro.convert(line, { mode: "normal", to: "hiragana" });
    }
  }));
  return converted.join("\n");
}

// ─────────────────────────────────────────────
//  Render lyrics panel
// ─────────────────────────────────────────────
async function showLyricsPanel(song) {
  resultsList.style.display = "none";
  lyricsPanel.style.display = "flex";
  lyricsPanel.classList.add("fade-in");

  panelTitle.textContent  = song.title;
  panelArtist.textContent = song.primary_artist.name;
  panelArt.src = song.song_art_image_thumbnail_url || "";

  setMode("original");
  setStatus("Fetching lyrics…", true);
  lyricsBox.textContent = "";

  try {
    originalLyrics = await fetchLyrics(song.url);
    lyricsBox.textContent = originalLyrics;
    setStatus("");
    // Pre-init kuroshiro in the background
    initKuroshiro();
  } catch(e) {
    lyricsBox.textContent = "⚠ " + e.message;
    setStatus("");
  }
}

function setMode(mode) {
  modeButtons.forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
}

// ─────────────────────────────────────────────
//  Render search results
// ─────────────────────────────────────────────
function renderResults(songs) {
  resultsList.innerHTML = "";
  if (!songs.length) {
    resultsList.innerHTML = `<p style="color:var(--muted);font-size:13px;">No results found.</p>`;
    return;
  }
  songs.forEach(song => {
    const el = document.createElement("div");
    el.className = "result-item fade-in";
    el.innerHTML = `
      <img src="${song.song_art_image_thumbnail_url || ''}" alt="art" onerror="this.style.visibility='hidden'" />
      <div class="result-meta">
        <strong>${escHtml(song.title)}</strong>
        <span>${escHtml(song.primary_artist.name)}</span>
      </div>
    `;
    el.addEventListener("click", () => showLyricsPanel(song));
    resultsList.appendChild(el);
  });
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ─────────────────────────────────────────────
//  Event listeners
// ─────────────────────────────────────────────
searchBtn.addEventListener("click", async () => {
  const q = searchInput.value.trim();
  if (!q) return;

  setStatus("Searching…", true);
  resultsList.innerHTML = "";
  lyricsPanel.style.display = "none";
  resultsList.style.display = "flex";

  try {
    currentResults = await searchGenius(q);
    setStatus(currentResults.length ? "" : "No results.");
    renderResults(currentResults);
  } catch(e) {
    setStatus("Error: " + e.message);
  }
});

searchInput.addEventListener("keydown", e => {
  if (e.key === "Enter") searchBtn.click();
});

backBtn.addEventListener("click", () => {
  lyricsPanel.style.display = "none";
  resultsList.style.display = "flex";
  setStatus("");
});

modeButtons.forEach(btn => {
  btn.addEventListener("click", async () => {
    const mode = btn.dataset.mode;
    setMode(mode);

    if (mode === "original") {
      lyricsBox.textContent = originalLyrics;
      return;
    }

    setStatus("Converting…", true);
    lyricsBox.innerHTML = "";
    try {
      const converted = await convertLyrics(originalLyrics, mode);
      if (mode === "furigana") {
        lyricsBox.innerHTML = converted;
      } else {
        lyricsBox.textContent = converted;
      }
      setStatus("");
    } catch(e) {
      setStatus("Conversion error: " + e.message);
    }
  });
});
</script>
</body>
</html>
